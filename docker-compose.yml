x-adk-common: &adk-common
  build:
    context: .
  env_file:
    - .env
  ports:
    - "${PORT:-8000}:8000"
  volumes:
    - ./data:/data
    - .:/app

services:
  adk-agent:
    <<: *adk-common
    container_name: google-adk-agent
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]

  adk-web:
    <<: *adk-common
    container_name: google-adk-web
    profiles: ["web"]
    command:
      ["python", "-m", "google.adk.cli", "web", "--host", "0.0.0.0", "--port", "8000", "agents"]
