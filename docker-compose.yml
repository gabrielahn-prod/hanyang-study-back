x-adk-common: &adk-common
  build:
    context: .
  env_file:
    - .env
  environment:
    OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://host.docker.internal:11434}
    PAPAGO_MCP_URL: ${PAPAGO_MCP_URL:-http://host.docker.internal:8001/mcp}
    PAPAGO_MCP_TIMEOUT: ${PAPAGO_MCP_TIMEOUT:-10}
  ports:
    - "${PORT:-8000}:8000"
  volumes:
    - ./data:/data
    - .:/app
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  adk-agent:
    <<: *adk-common
    container_name: google-adk-agent
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]

  adk-web:
    <<: *adk-common
    container_name: google-adk-web
    profiles: ["web"]
    command:
      ["python", "-m", "google.adk.cli", "web", "--host", "0.0.0.0", "--port", "8000", "agents"]
